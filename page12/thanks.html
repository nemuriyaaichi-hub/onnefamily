<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送信完了 | ONE FAMiLY</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --ink: #272521;
      --muted: #4e4a42;
      --line: #d9d4ca;
      --band: #f4f1eb;
      --accent: #756f63;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #fff;
      color: var(--ink);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif;
      line-height: 1.8;
      margin: 0;
    }

    header {
      background: rgba(39, 37, 33, 0.68);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      height: 42px;
      margin: 0 auto;
      max-width: 980px;
      width: 100%;
    }

    nav a {
      align-items: center;
      color: #000;
      display: flex;
      font-size: 14px;
      justify-content: center;
      min-width: 0;
      padding: 0 5px;
      text-decoration: none;
    }

    nav a:hover {
      color: #fff;
      background: rgba(117, 111, 99, 0.45);
    }

    nav a.active {
      color: #fff;
    }

    main {
      margin: 0 auto;
      max-width: 760px;
      padding: 64px 22px 86px;
      text-align: center;
    }

    h1 {
      font-size: 30px;
      font-weight: 400;
      line-height: 1.4;
      margin: 0 0 28px;
    }

    .panel {
      background: var(--band);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin: 0 auto;
      max-width: 560px;
      padding: 42px 28px;
    }

    .panel p {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.9;
      margin: 0;
    }

    .back {
      color: var(--accent);
      display: inline-block;
      font-size: 14px;
      margin-top: 28px;
    }

    footer {
      border-top: 1px solid var(--line);
      color: var(--accent);
      font-size: 12px;
      padding: 18px;
      text-align: center;
    }

    @media (max-width: 560px) {
      main {
        padding: 48px 18px 70px;
      }

      h1 {
        font-size: 26px;
      }

      .panel {
        padding: 34px 20px;
      }

      .panel p {
        font-size: 16px;
      }

      header {
        background: #66645f;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        height: auto;
        justify-content: center;
        padding: 10px 12px;
      }

      nav a {
        font-size: 12px;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="サイト">
      <a href="/">ホーム</a>
      <a href="/page11/">よくある質問</a>
      <a href="/page12/" class="active">お問い合わせ</a>
      <a href="/page13/">会社概要</a>
      <a href="/s-projects-side-by-side/">令和６年度実績</a>
    </nav>
  </header>
  <main>
    <h1>送信完了</h1>
    <section class="panel">
      <p>お問い合わせを送信しました。<br>ご連絡ありがとうございます。</p>
    </section>
    <a class="back" href="/page12/">お問い合わせページに戻る</a>
  </main>
  <footer>©2019 by ONE FAMiLY. Project Start</footer>
</body>
</html>
