<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ | ONE FAMiLY</title>
  <meta name="description" content="ONE FAMiLYへのお問い合わせ。LINEからお気軽に質問やお問い合わせができます。">
  <style>
    :root {
      --ink: #272521;
      --muted: #4e4a42;
      --line: #d9d4ca;
      --band: #f4f1eb;
      --accent: #756f63;
      --line-green: #06c755;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #fff;
      color: var(--ink);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif;
      line-height: 1.8;
      margin: 0;
    }

    header {
      background: rgba(39, 37, 33, 0.68);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      height: 42px;
      margin: 0 auto;
      max-width: 980px;
      width: 100%;
    }

    nav a {
      align-items: center;
      color: #000;
      display: flex;
      font-size: 14px;
      justify-content: center;
      min-width: 0;
      padding: 0 5px;
      text-decoration: none;
    }

    nav a:hover {
      color: #fff;
      background: rgba(117, 111, 99, 0.45);
    }

    nav a.active {
      color: #fff;
    }

    main {
      margin: 0 auto;
      max-width: 760px;
      padding: 64px 22px 86px;
      text-align: center;
    }

    h1 {
      font-size: 30px;
      font-weight: 400;
      line-height: 1.4;
      margin: 0 0 28px;
    }

    .panel {
      background: var(--band);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin: 0 auto;
      max-width: 560px;
      padding: 42px 28px;
    }

    .panel p {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.9;
      margin: 0;
    }

    .button {
      background: var(--line-green);
      color: #fff;
      display: inline-block;
      font-family: Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      margin-top: 28px;
      min-width: 180px;
      padding: 12px 26px;
      text-decoration: none;
    }

    .sub {
      color: var(--accent);
      font-size: 14px;
      margin: 22px auto 0;
      max-width: 440px;
    }

    .form-section {
      margin: 56px auto 0;
      max-width: 560px;
      text-align: left;
    }

    .form-section h2 {
      font-size: 24px;
      font-weight: 400;
      margin: 0 0 4px;
      text-align: center;
    }

    .form-section .form-lead {
      color: var(--accent);
      font-size: 14px;
      margin: 0 0 28px;
      text-align: center;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .field .req {
      color: #b3261e;
      font-size: 12px;
      margin-left: 4px;
    }

    .field input,
    .field select,
    .field textarea {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.6;
      padding: 10px 12px;
      width: 100%;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      outline: none;
    }

    .field textarea {
      min-height: 140px;
      resize: vertical;
    }

    .submit-button {
      background: var(--ink);
      border: 0;
      color: #fff;
      cursor: pointer;
      display: block;
      font-family: inherit;
      font-size: 15px;
      letter-spacing: 2px;
      margin: 28px auto 0;
      min-width: 180px;
      padding: 12px 26px;
    }

    .submit-button:hover {
      background: var(--accent);
    }

    .form-status {
      display: none;
      font-size: 15px;
      margin-top: 22px;
      text-align: center;
    }

    .form-status.show {
      display: block;
    }

    footer {
      border-top: 1px solid var(--line);
      color: var(--accent);
      font-size: 12px;
      padding: 18px;
      text-align: center;
    }

    @media (max-width: 560px) {
      main {
        padding: 48px 18px 70px;
      }

      h1 {
        font-size: 26px;
      }

      .panel {
        padding: 34px 20px;
      }

      .panel p {
        font-size: 16px;
      }

      header {
        background: #66645f;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        height: auto;
        justify-content: center;
        padding: 10px 12px;
      }

      nav a {
        font-size: 12px;
        padding: 0;
      }

      .form-section {
        margin-top: 44px;
      }

      .form-section h2 {
        font-size: 22px;
      }

      .form-section .form-lead {
        margin-bottom: 22px;
      }

      .field input,
      .field select,
      .field textarea {
        font-size: 16px;
        padding: 12px;
      }

      .field textarea {
        min-height: 120px;
      }

      .submit-button {
        font-size: 16px;
        padding: 14px 26px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="サイト">
      <a href="/">ホーム</a>
      <a href="/page11/">よくある質問</a>
      <a href="/page12/" class="active">お問い合わせ</a>
      <a href="/page13/">会社概要</a>
      <a href="/s-projects-side-by-side/">令和６年度実績</a>
    </nav>
  </header>
  <main>
    <h1>お問い合わせ</h1>
    <section class="panel">
      <p>LINEでお気軽に質問や<br>お問い合わせができるようになりました</p>
      <a class="button" href="https://lin.ee/2woFK0p" target="_blank" rel="noreferrer noopener">LINEでお気軽に</a>
      <p class="sub">商品やメンテナンスについてのご相談はこちらからご連絡ください。</p>
    </section>
    <section class="form-section">
      <h2>お問い合わせフォーム</h2>
      <p class="form-lead">ONE FAMiLY</p>
      <form name="contact" method="POST" action="/page12/thanks.html" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" value="contact">
        <p style="display:none"><label>このフィールドは入力しないでください<input name="bot-field"></label></p>
        <div class="field">
          <label for="email">メールアドレス<span class="req">※必須</span></label>
          <input type="email" id="email" name="メールアドレス" required autocomplete="email">
        </div>
        <div class="field">
          <label for="name">お名前<span class="req">※必須</span></label>
          <input type="text" id="name" name="お名前" required autocomplete="name">
        </div>
        <div class="field">
          <label for="topic">お問い合わせ内容</label>
          <select id="topic" name="お問い合わせ内容">
            <option value="">選択してください</option>
            <option>商品について</option>
            <option>ONE FAMiLYについて</option>
            <option>発送、お支払いについて</option>
            <option>メンテナンスについて</option>
            <option>その他</option>
          </select>
        </div>
        <div class="field">
          <label for="message">お問い合わせをご記入ください<span class="req">※必須</span></label>
          <textarea id="message" name="お問い合わせ" required></textarea>
        </div>
        <button type="submit" class="submit-button">送信</button>
        <p class="form-status" id="form-status"></p>
      </form>
    </section>
  </main>
  <script>
    document.querySelector('form[name="contact"]').addEventListener('submit', function (e) {
      e.preventDefault();
      var form = e.target;
      var status = document.getElementById('form-status');
      var button = form.querySelector('.submit-button');
      button.disabled = true;
      fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(new FormData(form)).toString()
      }).then(function (res) {
        if (!res.ok) throw new Error(res.status);
        form.reset();
        status.textContent = 'お問い合わせを送信しました。ご連絡ありがとうございます。';
        status.classList.add('show');
      }).catch(function () {
        status.textContent = '送信に失敗しました。お手数ですが時間をおいて再度お試しいただくか、LINEよりご連絡ください。';
        status.classList.add('show');
      }).finally(function () {
        button.disabled = false;
      });
    });
  </script>
  <footer>©2019 by ONE FAMiLY. Project Start</footer>
</body>
</html>
